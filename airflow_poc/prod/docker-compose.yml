x-airflow-common: &airflow-common
  image: uniuni-airflow:2.8.1
  user: "${AIRFLOW_UID:-1000}:0"
  environment:
    # Airflow core
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__CORE__LOAD_EXAMPLES=false
    - AIRFLOW__CORE__PARALLELISM=16
    - AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG=16
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_SECRET_KEY:-prod_secret_key_2026}

    # DAG environment variables (from .env)
    - DB_USER=${DB_USER}
    - DB_US_PROD_RO_PASSWORD=${DB_US_PROD_RO_PASSWORD}
    - DB_PROD_HOST=${DB_PROD_HOST}
    - DB_PROD_PORT=${DB_PROD_PORT}
    - DB_DW_WRITE_HOST=${DB_DW_WRITE_HOST}
    - DB_DW_WRITE_PORT=${DB_DW_WRITE_PORT}
    - DB_DW_WRITE_PASSWORD=${DB_DW_WRITE_PASSWORD}
    - USE_SSH_TUNNEL=${USE_SSH_TUNNEL:-false}
    - ALERT_SMTP_HOST=${ALERT_SMTP_HOST}
    - ALERT_SMTP_PORT=${ALERT_SMTP_PORT}
    - ALERT_SMTP_USER=${ALERT_SMTP_USER}
    - ALERT_SMTP_PASSWORD=${ALERT_SMTP_PASSWORD}
    - SYNC_ALERT_EMAILS=${SYNC_ALERT_EMAILS}

  volumes:
    - ../dags:/opt/airflow/dags
    - ../scripts:/opt/airflow/scripts
    - ./logs:/opt/airflow/logs

  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        airflow db init &&
        airflow users create
          --username admin
          --password $${AIRFLOW_ADMIN_PASSWORD:-admin123}
          --firstname Admin
          --lastname User
          --role Admin
          --email admin@example.com
      "
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    restart: always
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'

volumes:
  postgres-db-volume:
